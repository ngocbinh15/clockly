  supabase_flutter: ^2.10.6
  intl: ^0.20.2
  image_picker: ^1.2.2
  email_validator: ^3.0.0
  permission_handler: ^12.0.1
  table_calendar: ^3.2.0
  pin_code_fields: ^9.3.0
  package_info_plus: ^10.1.0
  animated_bottom_navigation_bar: ^1.4.0
  dotted_border: ^3.1.0
  fl_chart: ^1.2.0
  confetti: ^0.8.0
  flutter_dotenv: ^6.0.1
  http:
  chat_bubbles: ^1.9.3
  quick_settings: ^1.0.1
  url_launcher: ^6.0.0
  android_intent_plus: ^6.0.0
  flutter_local_notifications: ^21.0.0

