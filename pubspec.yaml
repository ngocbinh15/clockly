name: clockly
description: "A final project"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4
dependencies:
  flutter:
    sdk: flutter

  hugeicons: ^1.1.6
  shared_preferences: ^2.5.5
  get: ^4.7.3
  flutter_spinkit: ^5.2.2
  flutter_slidable: ^4.0.3
  google_fonts:
  sqflite: ^2.4.2+1
