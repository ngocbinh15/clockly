name: clockly
description: "A final project"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7
dependencies:
  flutter:
    sdk: flutter

  hugeicons: ^1.1.6
  shared_preferences: ^2.5.5
  get: ^4.7.3
  flutter_spinkit: ^5.2.2
  flutter_slidable: ^4.0.3
  google_fonts:
  sqflite: ^2.4.2+1
  connectivity_plus: ^6.1.5
  supabase_flutter: ^2.10.6
  intl: ^0.20.2
  image_picker: ^1.2.2
  email_validator: ^3.0.0
  permission_handler: ^12.0.1
  table_calendar: ^3.2.0
  pin_code_fields: ^9.3.0
  package_info_plus: ^10.1.0
  animated_bottom_navigation_bar: ^1.4.0
  dotted_border: ^3.1.0
  fl_chart: ^1.2.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
flutter:
  assets:
    - assets/images/

  uses-material-design: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icon/app_icon.png"

  # (Tùy chọn) Đổi màu nền cho icon trên Android nếu ảnh của bạn là ảnh trong suốt (trong suốt sẽ bị lỗi nền đen trên Android)
  # adaptive_icon_background: "#FFFFFF"
  # adaptive_icon_foreground: "assets/icon/app_icon.png"